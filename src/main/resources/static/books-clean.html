<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Books - CUET Library</title>
  <link rel="icon" type="image/png" href="images/cuet-logo.png">
  <link rel="stylesheet" href="styles/main.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    .header-actions {
        display: flex !important;
        align-items: center !important;
        gap: 12px !important;
    }

    /* Book grid styles */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .book-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .book-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .book-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 48px;
    }

    .book-content {
      padding: 16px;
    }

    .book-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0 0 8px 0;
      line-height: 1.3;
    }

    .book-author {
      font-size: 14px;
      color: #666;
      margin: 0 0 8px 0;
    }

    .book-details {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      font-size: 12px;
      color: #888;
    }

    .book-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-borrow {
      flex: 1;
      background: #1877f2;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-borrow:hover {
      background: #166fe5;
    }

    .btn-borrow:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-details {
      background: #f0f2f5;
      color: #1a1a1a;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .availability-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .available {
      background: #d4edda;
      color: #155724;
    }

    .unavailable {
      background: #f8d7da;
      color: #721c24;
    }

    /* Search and filter styles */
    .search-filters {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 300px;
      padding: 12px 16px;
      border: 2px solid #e4e6ea;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-input:focus {
      outline: none;
      border-color: #1877f2;
    }

    .filter-select {
      padding: 12px 16px;
      border: 2px solid #e4e6ea;
      border-radius: 8px;
      font-size: 14px;
      background: white;
    }

    .btn-search {
      background: #1877f2;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-clear {
      background: #6c757d;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Loading and empty states */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin: 0;
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="logo">
          <img src="images/cuet-logo.png" alt="CUET Logo" class="logo-img">
          <div class="logo-text">
            <div class="logo-title">CUET Library</div>
            <div class="logo-subtitle">Digital Collection</div>
          </div>
        </div>
      </div>

      <nav class="nav">
        <a href="dashboard.html" class="nav-link">
          <i data-lucide="home"></i>
          <span>Dashboard</span>
        </a>
        <a href="books.html" class="nav-link active">
          <i data-lucide="book-open"></i>
          <span>Books</span>
        </a>
        <a href="my-books.html" class="nav-link">
          <i data-lucide="bookmark"></i>
          <span>My Books</span>
        </a>
        <a href="profile.html" class="nav-link">
          <i data-lucide="user"></i>
          <span>Profile</span>
        </a>
      </nav>

      <div class="header-actions auth-buttons">        
        <button id="logoutNavBtn" class="btn btn-outline" onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
      </div>
    </div>
  </header>
  
  <div class="page-container">
    <div class="page-header">
      <h1 class="page-title">Library Catalog</h1>
      <p class="page-description">Search and discover books from our extensive collection</p>
    </div>

    <!-- Search and Filters -->
    <div class="search-filters">
      <div class="search-row">
        <input type="text" id="searchInput" class="search-input" placeholder="Search books by title, author, or ISBN...">
        <select id="categoryFilter" class="filter-select">
          <option value="">All Categories</option>
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Science">Science</option>
          <option value="Technology">Technology</option>
          <option value="History">History</option>
          <option value="Biography">Biography</option>
        </select>
        <select id="availabilityFilter" class="filter-select">
          <option value="">All Books</option>
          <option value="available">Available Only</option>
          <option value="unavailable">Unavailable</option>
        </select>
        <button class="btn-search" onclick="searchBooks()">
          <i data-lucide="search"></i> Search
        </button>
        <button class="btn-clear" onclick="clearFilters()">
          <i data-lucide="x"></i> Clear
        </button>
      </div>
    </div>

    <!-- Books Grid -->
    <div id="booksContainer" class="books-grid">
      <div class="loading">
        <i data-lucide="loader"></i>
        <p>Loading books...</p>
      </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <i data-lucide="book-x"></i>
      <h3>No books found</h3>
      <p>Try adjusting your search criteria or browse all available books.</p>
    </div>
  </div>

  <!-- Book Details Modal -->
  <div id="bookModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Book Details</h2>
        <button class="btn-close" onclick="closeBookModal()">&times;</button>
      </div>
      <div id="bookModalContent">
        <!-- Book details will be loaded here -->
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Books data and state
    let allBooks = [];
    let filteredBooks = [];
    let currentUser = null;

    // Load books on page load
    document.addEventListener('DOMContentLoaded', function() {
      checkAuth();
      loadBooks();
    });

    // Authentication check
    function checkAuth() {
      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');
      
      if (!token || !user) {
        window.location.href = 'login.html';
        return;
      }
      
      try {
        currentUser = JSON.parse(user);
      } catch (e) {
        console.error('Error parsing user data:', e);
        logout();
      }
    }

    // Load books from API
    async function loadBooks() {
      try {
        console.log('Loading books from API...');
        const token = localStorage.getItem('token');
        
        const response = await fetch('/api/books/available', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const books = await response.json();
        console.log('Loaded books from /api/books/available:', books.length);
        
        allBooks = books;
        filteredBooks = books;
        renderBooks();
      } catch (error) {
        console.error('Error loading books:', error);
        showError('Failed to load books. Please try again.');
      }
    }

    // Render books in the grid
    function renderBooks() {
      const container = document.getElementById('booksContainer');
      const emptyState = document.getElementById('emptyState');

      if (filteredBooks.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      container.style.display = 'grid';
      emptyState.style.display = 'none';

      container.innerHTML = filteredBooks.map(book => `
        <div class="book-card">
          <div class="book-image">
            <i data-lucide="book"></i>
          </div>
          <div class="book-content">
            <h3 class="book-title">${escapeHtml(book.title)}</h3>
            <p class="book-author">by ${escapeHtml(book.author)}</p>
            <div class="book-details">
              <span>ISBN: ${book.isbn}</span>
              <span class="availability-badge ${book.availableCopies > 0 ? 'available' : 'unavailable'}">
                ${book.availableCopies > 0 ? 'Available' : 'Unavailable'}
              </span>
            </div>
            <div class="book-details">
              <span>Category: ${escapeHtml(book.category || 'N/A')}</span>
              <span>${book.availableCopies}/${book.totalCopies} copies</span>
            </div>
            <div class="book-actions">
              <button class="btn-borrow" 
                      onclick="borrowBook(${book.isbn})" 
                      ${book.availableCopies <= 0 ? 'disabled' : ''}>
                <i data-lucide="plus"></i> 
                ${book.availableCopies > 0 ? 'Request Book' : 'Unavailable'}
              </button>
              <button class="btn-details" onclick="showBookDetails(${book.bookId})">
                <i data-lucide="info"></i>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      // Reinitialize Lucide icons
      lucide.createIcons();
    }

    // Search books
    function searchBooks() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const categoryFilter = document.getElementById('categoryFilter').value;
      const availabilityFilter = document.getElementById('availabilityFilter').value;

      filteredBooks = allBooks.filter(book => {
        const matchesSearch = !searchTerm || 
          book.title.toLowerCase().includes(searchTerm) ||
          book.author.toLowerCase().includes(searchTerm) ||
          book.isbn.toString().includes(searchTerm);

        const matchesCategory = !categoryFilter || book.category === categoryFilter;

        const matchesAvailability = !availabilityFilter ||
          (availabilityFilter === 'available' && book.availableCopies > 0) ||
          (availabilityFilter === 'unavailable' && book.availableCopies <= 0);

        return matchesSearch && matchesCategory && matchesAvailability;
      });

      renderBooks();
    }

    // Clear filters
    function clearFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('categoryFilter').value = '';
      document.getElementById('availabilityFilter').value = '';
      filteredBooks = allBooks;
      renderBooks();
    }

    // Request book function (PreBook system)
    async function borrowBook(isbn) {
      try {
        const token = localStorage.getItem('token');
        
        // First find the book by ISBN to get bookId
        const book = allBooks.find(b => b.isbn == isbn);
        if (!book) {
          throw new Error('Book not found');
        }
        
        const response = await fetch('/api/prebooks/request', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            bookId: book.bookId
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(errorText || 'Failed to request book');
        }

        const result = await response.json();
        showSuccess('Book request submitted successfully! Wait for admin approval.');
        loadBooks(); // Reload to update availability
      } catch (error) {
        console.error('Request error:', error);
        showError('Failed to request book: ' + error.message);
      }
    }

    // Show book details
    function showBookDetails(bookId) {
      const book = allBooks.find(b => b.bookId === bookId);
      if (!book) return;

      const modalContent = document.getElementById('bookModalContent');
      modalContent.innerHTML = `
        <div class="book-details-content">
          <h3>${escapeHtml(book.title)}</h3>
          <p><strong>Author:</strong> ${escapeHtml(book.author)}</p>
          <p><strong>ISBN:</strong> ${book.isbn}</p>
          <p><strong>Category:</strong> ${escapeHtml(book.category || 'N/A')}</p>
          <p><strong>Total Copies:</strong> ${book.totalCopies}</p>
          <p><strong>Available Copies:</strong> ${book.availableCopies}</p>
          <p><strong>Status:</strong> 
            <span class="availability-badge ${book.availableCopies > 0 ? 'available' : 'unavailable'}">
              ${book.availableCopies > 0 ? 'Available' : 'Unavailable'}
            </span>
          </p>
        </div>
      `;

      document.getElementById('bookModal').style.display = 'block';
    }

    // Close book modal
    function closeBookModal() {
      document.getElementById('bookModal').style.display = 'none';
    }

    // Utility functions
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showSuccess(message) {
      alert('✅ ' + message); // Replace with proper notification system
    }

    function showError(message) {
      alert('❌ ' + message); // Replace with proper notification system
    }

    // Logout function
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('bookModal');
      if (event.target === modal) {
        closeBookModal();
      }
    }

    // Search on Enter key
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchBooks();
      }
    });
  </script>
</body>
</html>
