<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search - CUET Library Admin</title>
    <link rel="icon" type="image/png" href="images/cuet-logo.png">
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .search-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .search-form {
            background: var(--card);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text-primary);
        }
        
        .search-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-dark);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #545b62;
        }
        
        .results-container {
            background: var(--card);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .results-count {
            color: #666;
            font-size: 14px;
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .users-table th {
            background: var(--bg);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .users-table tr:hover {
            background: rgba(0, 0, 0, 0.02);
        }
        
        .user-role {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .role-admin {
            background: #d4edda;
            color: #155724;
        }
        
        .role-student {
            background: #cce5ff;
            color: #004085;
        }
        
        .user-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        
        .status-inactive {
            background: #f8d7da;
            color: #721c24;
        }
        
        .user-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #212529;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }
        
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-primary);
        }
        
        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination .current-page {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <a href="admin.html" class="back-link">← Back to Admin Dashboard</a>
        
        <h1>User Search & Management</h1>
        
        <div class="search-form">
            <form id="search-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="keyword">Search Keyword</label>
                        <input type="text" id="keyword" name="keyword" placeholder="Search by name, email, or student ID...">
                    </div>
                    <div class="form-group">
                        <label for="role">Role Filter</label>
                        <select id="role" name="role">
                            <option value="">All Roles</option>
                            <option value="STUDENT">Students</option>
                            <option value="ADMIN">Administrators</option>
                        </select>
                    </div>
                </div>
                
                <div class="search-buttons">
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">Clear</button>
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
        
        <div class="results-container" id="results-container" style="display: none;">
            <div class="results-header">
                <h2>Search Results</h2>
                <div class="results-count" id="results-count"></div>
            </div>
            
            <div id="results-content">
                <!-- Results will be loaded here -->
            </div>
            
            <div class="pagination" id="pagination">
                <!-- Pagination will be loaded here -->
            </div>
        </div>
    </div>

    <script src="js/api-service.js"></script>
    <script>
        let currentPage = 0;
        let totalPages = 0;
        let currentSearchParams = {};

        // Check if user is admin
        window.addEventListener('DOMContentLoaded', function() {
            const userRole = localStorage.getItem('role');
            if (userRole !== 'ADMIN') {
                alert('Access denied. Admin privileges required.');
                window.location.href = 'index.html';
                return;
            }
            
            // Load all users initially
            performSearch(0);
        });

        document.getElementById('search-form').addEventListener('submit', function(e) {
            e.preventDefault();
            performSearch(0);
        });

        async function performSearch(page = 0) {
            const formData = new FormData(document.getElementById('search-form'));
            const keyword = formData.get('keyword');
            const role = formData.get('role');

            // Store current search parameters
            currentSearchParams = { keyword, role };
            currentPage = page;

            const resultsContainer = document.getElementById('results-container');
            const resultsContent = document.getElementById('results-content');
            
            resultsContainer.style.display = 'block';
            resultsContent.innerHTML = '<div class="loading">Searching...</div>';

            try {
                let endpoint = '';
                let params = new URLSearchParams();
                params.append('page', page);
                params.append('size', '20');

                if (keyword && keyword.trim()) {
                    // Use search endpoint
                    endpoint = '/api/users/search';
                    params.append('keyword', keyword.trim());
                } else if (role) {
                    // Use role filter endpoint
                    endpoint = `/api/users/role/${role}`;
                    // Role endpoint doesn't support pagination, so we'll get all and paginate client-side
                    const response = await ApiService.request(endpoint);
                    displayRoleResults(response, page);
                    return;
                } else {
                    // Use general users endpoint
                    endpoint = '/api/users';
                }

                const response = await ApiService.request(`${endpoint}?${params.toString()}`);
                
                if (response.content) {
                    // Paginated response
                    displayResults(response.content, response.totalElements, response.totalPages);
                    totalPages = response.totalPages;
                } else if (Array.isArray(response)) {
                    // Array response
                    displayResults(response, response.length, 1);
                    totalPages = 1;
                } else {
                    displayResults([], 0, 0);
                    totalPages = 0;
                }
            } catch (error) {
                console.error('Search failed:', error);
                resultsContent.innerHTML = '<div class="no-results">Search failed. Please try again.</div>';
            }
        }

        function displayRoleResults(users, page) {
            const pageSize = 20;
            const startIndex = page * pageSize;
            const endIndex = startIndex + pageSize;
            const paginatedUsers = users.slice(startIndex, endIndex);
            const totalPagesCount = Math.ceil(users.length / pageSize);
            
            displayResults(paginatedUsers, users.length, totalPagesCount);
            totalPages = totalPagesCount;
        }

        function displayResults(users, totalCount, totalPagesCount) {
            const resultsContent = document.getElementById('results-content');
            const resultsCount = document.getElementById('results-count');
            
            resultsCount.textContent = `${totalCount} user(s) found`;

            if (users.length === 0) {
                resultsContent.innerHTML = '<div class="no-results">No users found matching your criteria.</div>';
                updatePagination(0, 0);
                return;
            }

            const usersHtml = `
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Student ID</th>
                            <th>Department</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${escapeHtml(user.name || 'N/A')}</td>
                                <td>${escapeHtml(user.email || 'N/A')}</td>
                                <td>${escapeHtml(user.studentId || 'N/A')}</td>
                                <td>${escapeHtml(user.department || 'N/A')}</td>
                                <td><span class="user-role role-${user.role.toLowerCase()}">${user.role}</span></td>
                                <td><span class="user-status status-${user.active ? 'active' : 'inactive'}">${user.active ? 'Active' : 'Inactive'}</span></td>
                                <td>
                                    <div class="user-actions">
                                        ${user.active ? 
                                            `<button class="btn btn-warning btn-small" onclick="toggleUserStatus('${user.email}', false)">Deactivate</button>` :
                                            `<button class="btn btn-success btn-small" onclick="toggleUserStatus('${user.email}', true)">Activate</button>`
                                        }
                                        <button class="btn btn-danger btn-small" onclick="deleteUser('${user.email}')">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            resultsContent.innerHTML = usersHtml;
            updatePagination(currentPage, totalPagesCount);
        }

        function updatePagination(currentPageNum, totalPagesCount) {
            const pagination = document.getElementById('pagination');
            
            if (totalPagesCount <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let paginationHtml = '';
            
            // Previous button
            paginationHtml += `<button ${currentPageNum === 0 ? 'disabled' : ''} onclick="performSearch(${currentPageNum - 1})">Previous</button>`;
            
            // Page numbers
            const startPage = Math.max(0, currentPageNum - 2);
            const endPage = Math.min(totalPagesCount - 1, currentPageNum + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                paginationHtml += `<button class="${i === currentPageNum ? 'current-page' : ''}" onclick="performSearch(${i})">${i + 1}</button>`;
            }
            
            // Next button
            paginationHtml += `<button ${currentPageNum === totalPagesCount - 1 ? 'disabled' : ''} onclick="performSearch(${currentPageNum + 1})">Next</button>`;
            
            pagination.innerHTML = paginationHtml;
        }

        async function toggleUserStatus(email, activate) {
            const action = activate ? 'activate' : 'deactivate';
            if (!confirm(`Are you sure you want to ${action} this user?`)) {
                return;
            }

            try {
                const endpoint = `/api/users/${encodeURIComponent(email)}/${action}`;
                await ApiService.request(endpoint, { method: 'PUT' });
                
                // Refresh current search
                performSearch(currentPage);
                
                alert(`User ${activate ? 'activated' : 'deactivated'} successfully.`);
            } catch (error) {
                console.error(`Failed to ${action} user:`, error);
                alert(`Failed to ${action} user. Please try again.`);
            }
        }

        async function deleteUser(email) {
            if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                return;
            }

            try {
                const endpoint = `/api/users/${encodeURIComponent(email)}`;
                await ApiService.request(endpoint, { method: 'DELETE' });
                
                // Refresh current search
                performSearch(currentPage);
                
                alert('User deleted successfully.');
            } catch (error) {
                console.error('Failed to delete user:', error);
                alert('Failed to delete user. Please try again.');
            }
        }

        function clearForm() {
            document.getElementById('search-form').reset();
            performSearch(0);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
