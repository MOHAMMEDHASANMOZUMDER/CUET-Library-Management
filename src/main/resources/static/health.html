<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Health - CUET Library</title>
  <link rel="icon" type="image/png" href="images/cuet-logo.png">
  <link rel="stylesheet" href="styles/main.css" />
  <style>
    :root{ --card:#0b1220; --radius:12px; }
    body{ font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; background: #0f1724; color:#e6eef8; margin:0; }
    .container{ max-width:800px; margin:40px auto; padding:0 20px; }
    .panel{ background: var(--card); border-radius: var(--radius); padding:24px; box-shadow:0 6px 18px rgba(0,0,0,.25); }
    .title{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; }
    .status{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:999px; font-weight:600; font-size:13px; }
    .ok{ background:#063; color:#bdf8cf; border:1px solid #0a5; }
    .fail{ background:#5c0011; color:#ffd2da; border:1px solid #a00; }
    .meta{ color:#a3b3c5; font-size:13px; }
    .btn{ appearance:none; border:1px solid #2a3a4d; color:#e6eef8; background:transparent; padding:8px 12px; border-radius:8px; cursor:pointer; }
    .btn:hover{ background:#0c1627; }
    .grid{ display:grid; gap:12px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 640px){ .grid{ grid-template-columns: 1fr; } }
    code{ background:#0c1627; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>System Health</h1>

    <div class="panel">
      <div class="title">
        <div>
          <div style="font-weight:700; font-size:18px;">Authentication Service</div>
          <div class="meta">Endpoint: <code>/api/auth/health</code></div>
        </div>
        <button class="btn" id="refresh">Refresh</button>
      </div>

      <div id="auth-status" class="status" style="display:none"></div>
      <pre id="details" style="margin-top:16px; white-space:pre-wrap; color:#c8d5e5"></pre>
    </div>

    <div style="margin-top:16px;">
      <a class="btn" href="admin.html">← Back to Admin</a>
    </div>
  </div>

  <script src="js/api-service.js"></script>
  <script>
    async function checkAuthHealth(){
      const statusEl = document.getElementById('auth-status');
      const detailsEl = document.getElementById('details');
      statusEl.style.display = 'none';
      detailsEl.textContent = 'Checking...';
      try{
        const start = performance.now();
        const resp = await ApiService.request('/auth/health');
        const ms = Math.round(performance.now() - start);
        statusEl.className = 'status ok';
        statusEl.textContent = 'Healthy';
        statusEl.style.display = 'inline-flex';
        detailsEl.textContent = `Response: ${typeof resp === 'string' ? resp : JSON.stringify(resp)}\nLatency: ${ms} ms`;
      }catch(err){
        statusEl.className = 'status fail';
        statusEl.textContent = 'Unreachable';
        statusEl.style.display = 'inline-flex';
        detailsEl.textContent = `Error: ${err?.message || err}`;
      }
    }
    document.getElementById('refresh').addEventListener('click', checkAuthHealth);
    window.addEventListener('DOMContentLoaded', checkAuthHealth);
  </script>
</body>
</html>
