<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CUET Library</title>
    <link rel="icon" type="image/png" href="images/cuet-logo.png">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/modern-theme.css">
    <link rel="stylesheet" href="styles/animations.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="auth-page">
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <div class="auth-container animate-fade-in-up">
        <!-- Header -->
        <div class="auth-header">
            <a href="index.html" class="back-to-home"><i data-lucide="arrow-left"></i><span>Back to Home</span></a>
            <a href="index.html" class="auth-brand">
                <img src="images/cuet-logo.png" alt="CUET Logo" style="width: 2rem; height: 2rem;">
                <span>CUET Library</span>
            </a>
            <p class="auth-subtitle">Create your student account</p>
        </div>

        <!-- Registration Form -->
        <div class="auth-card">
            <div class="card-header">
                <h1 class="card-title">User Registration</h1>
                <p class="card-description">Fill in your details to create an account</p>
            </div>

            <form class="auth-form" id="registration-form">
                <div class="form-group">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" name="studentId" placeholder="e.g., 2204054" required>
                </div>

                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your.email@student.cuet.ac.bd" required>
                </div>

                <div class="form-group">
                    <button type="button" id="send-register-otp" class="btn btn-outline btn-full">Send Email OTP</button>
                    <p id="register-otp-hint" style="margin-top:8px;font-size:0.85rem;display:none"></p>
                </div>

                <div class="form-group" id="register-otp-group" style="display:none">
                    <label for="register-otp">Email OTP</label>
                    <input type="text" id="register-otp" name="otp" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter the 6-digit code" maxlength="6">
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department" name="department" required>
                        <option value="">Select your department</option>
                        <option value="CSE">Computer Science & Engineering</option>
                        <option value="EEE">Electrical & Electronic Engineering</option>
                        <option value="ME">Mechanical Engineering</option>
                        <option value="CE">Civil Engineering</option>
                        <option value="ChE">Chemical Engineering</option>
                        <option value="IPE">Industrial & Production Engineering</option>
                        <option value="ARCH">Architecture</option>
                        <option value="URP">Urban & Regional Planning</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="session">Session</label>
                    <select id="session" name="session" required>
                        <option value="">Select your session</option>
                        <option value="2024-25">2024-2025</option>
                        <option value="2023-24">2023-2024</option>
                        <option value="2022-23">2022-2023</option>
                        <option value="2021-22">2021-2022</option>
                        <option value="2020-21">2020-2021</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div id="register-status" style="margin:8px 0;font-size:0.85rem;color:#dc2626;display:none"></div>
                <button type="submit" id="register-submit" class="btn btn-primary btn-full" disabled>Create Account</button>
            </form>
        </div>

        <div class="auth-footer">
            <p style="color: rgb(79, 79, 104);">Already have an account? <a href="login.html" style="color: blue;">Sign in here</a></p>
        </div>
    </div>

    <script src="scripts/auth.js"></script>
    <script>
        // Hide loading overlay
        setTimeout(() => {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) loadingOverlay.classList.add('hidden');
        }, 300);

        // Initialize Lucide icons
        if (window.lucide) lucide.createIcons();
    </script>
</body>
</html>
