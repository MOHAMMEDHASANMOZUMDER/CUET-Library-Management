<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraryForge API Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; border: 1px solid #bee5eb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>LibraryForge API Debug Tool</h1>
    
    <div id="results"></div>
    
    <button onclick="testAllEndpoints()">Test All Endpoints</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <script>
        const resultsDiv = document.getElementById('results');
        
        function addResult(title, success, message, data = null) {
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
            resultsDiv.appendChild(div);
        }
        
        function addInfo(title, message) {
            const div = document.createElement('div');
            div.className = 'test-result info';
            div.innerHTML = `<h3>${title}</h3><p>${message}</p>`;
            resultsDiv.appendChild(div);
        }
        
        async function testEndpoint(url, description) {
            try {
                addInfo('Testing', `${description}: ${url}`);
                
                const response = await fetch(url);
                const contentType = response.headers.get('content-type');
                
                if (response.ok) {
                    if (contentType && contentType.includes('application/json')) {
                        const data = await response.json();
                        addResult(description, true, `✅ Success (${response.status})`, data);
                    } else {
                        const text = await response.text();
                        addResult(description, false, `❌ Expected JSON but got: ${contentType}`, text.substring(0, 500) + '...');
                    }
                } else {
                    const text = await response.text();
                    addResult(description, false, `❌ HTTP ${response.status}: ${response.statusText}`, text.substring(0, 500) + '...');
                }
            } catch (error) {
                addResult(description, false, `❌ Network Error: ${error.message}`);
            }
        }
        
        async function testAllEndpoints() {
            clearResults();
            
            const endpoints = [
                { url: '/api/auth/health', desc: 'Health Check' },
                { url: '/api/books/stats/total', desc: 'Total Books' },
                { url: '/api/books/stats/available', desc: 'Available Books' },
                { url: '/api/books?page=0&size=5', desc: 'Books List' },
                { url: '/api/users/role/STUDENT', desc: 'Student Users' },
                { url: '/api/prebooks/status/PENDING', desc: 'Pending Prebooks' },
                { url: '/api/notes/admin/stats', desc: 'Note Stats' },
                { url: '/api/fines/admin/all', desc: 'All Fines' }
            ];
            
            for (const endpoint of endpoints) {
                await testEndpoint(endpoint.url, endpoint.desc);
                await new Promise(resolve => setTimeout(resolve, 500)); // Small delay
            }
        }
        
        function clearResults() {
            resultsDiv.innerHTML = '';
        }
        
        // Auto-run tests on page load
        window.addEventListener('DOMContentLoaded', testAllEndpoints);
    </script>
</body>
</html>
